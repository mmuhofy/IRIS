name: Release

on:
  push:
    branches: [ "main", "develop" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK
        run: |
          SDK_DIR="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          echo "ANDROID_HOME=$SDK_DIR" >> "$GITHUB_ENV"
          SDKMANAGER=""
          for sp in "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" \
                     "$SDK_DIR/tools/bin/sdkmanager"; do
            if [ -f "$sp" ]; then SDKMANAGER="$sp"; break; fi
          done
          if [ -z "$SDKMANAGER" ]; then
            echo "ERROR: sdkmanager not found at $SDK_DIR"
            exit 1
          fi
          NDK_VERSION="27.0.12077973"
          if [ ! -d "$SDK_DIR/ndk/$NDK_VERSION" ]; then
            echo "y" | "$SDKMANAGER" "ndk;$NDK_VERSION" 2>&1 || true
          fi
          echo "ANDROID_NDK_HOME=$SDK_DIR/ndk/$NDK_VERSION" >> "$GITHUB_ENV"

      - name: Cache Gradle & Android build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties', 'app/build.gradle.kts', 'build.gradle.kts', 'app/src/main/jni/Android.mk', 'app/src/main/jni/iris-exec-hook.c', 'app/src/main/jni/iris-subprocess.c', 'app/src/main/jni/iris-bootstrap-zip.S', 'app/src/main/jni/iris-bootstrap.c') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Inject API keys
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"      >> local.properties
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}"          >> local.properties
          echo "WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }}"    >> local.properties
          echo "TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}"      >> local.properties
          echo "NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}"          >> local.properties
          echo "GROQ_LLM_API_KEY=${{ secrets.GROQ_LLM_API_KEY }}" >> local.properties
          echo "HF_API_KEY=${{ secrets.HF_API_KEY }}"              >> local.properties

      - name: Decode release keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_B64 }}" | base64 -d > release.keystore

      - name: Grant Gradle wrapper permission
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --build-cache --parallel --no-daemon
        env:
          RELEASE_KEYSTORE_PATH: release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Rename APK with version
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          VERSION=$(aapt dump badging "$APK" 2>/dev/null | grep -o "versionName='[^']*'" | cut -d"'" -f2 || echo "${{ github.ref_name }}")
          mv "$APK" "app/build/outputs/apk/release/iris-${VERSION}.apk"

      - name: Upload APK to workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iris-release-${{ github.ref_name }}
          path: app/build/outputs/apk/release/iris-*.apk
          retention-days: 90

      - name: Upload APK to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "IRIS ${{ github.ref_name }}"
          body: "See the commits for details."
          files: app/build/outputs/apk/release/iris-*.apk
          make_latest: "true"
