name: Debug

on:
  workflow_dispatch:

concurrency:
  group: ci-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK
        run: |
          SDK_DIR="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          echo "ANDROID_HOME=$SDK_DIR" >> "$GITHUB_ENV"
          SDKMANAGER=""
          for sp in "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" \
                     "$SDK_DIR/tools/bin/sdkmanager"; do
            if [ -f "$sp" ]; then SDKMANAGER="$sp"; break; fi
          done
          if [ -z "$SDKMANAGER" ]; then
            echo "ERROR: sdkmanager not found at $SDK_DIR"
            exit 1
          fi
          NDK_VERSION="27.0.12077973"
          if [ ! -d "$SDK_DIR/ndk/$NDK_VERSION" ]; then
            echo "y" | "$SDKMANAGER" "ndk;$NDK_VERSION" 2>&1 || true
          fi
          echo "ANDROID_NDK_HOME=$SDK_DIR/ndk/$NDK_VERSION" >> "$GITHUB_ENV"

      - name: Cache Gradle & Android build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties', 'app/build.gradle.kts', 'build.gradle.kts') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Inject API keys
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"      >> local.properties
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}"          >> local.properties
          echo "WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }}"    >> local.properties
          echo "TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}"      >> local.properties
          echo "NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}"          >> local.properties
          echo "GROQ_LLM_API_KEY=${{ secrets.GROQ_LLM_API_KEY }}" >> local.properties
          echo "HF_API_KEY=${{ secrets.HF_API_KEY }}"              >> local.properties

      - name: Download bootstrap zip to NDK jni directory
        run: |
          curl -fsSL \
            "https://github.com/mmuhofy/IRIS/releases/download/bootstrap-20260624-r1/CHECKSUMS.sha256" \
            -o /tmp/CHECKSUMS.sha256
          curl -fsSL \
            "https://github.com/mmuhofy/IRIS/releases/download/bootstrap-20260624-r1/bootstrap-aarch64.zip" \
            -o /tmp/bootstrap-outer.zip
          EXPECTED=$(grep "bootstrap-aarch64.zip" /tmp/CHECKSUMS.sha256 | awk '{print $1}')
          ACTUAL=$(sha256sum /tmp/bootstrap-outer.zip | awk '{print $1}')
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "SHA-256 mismatch! expected=$EXPECTED actual=$ACTUAL"
            exit 1
          fi
          echo "Bootstrap zip verified: $ACTUAL"
          mkdir -p app/src/main/jni
          unzip -o /tmp/bootstrap-outer.zip -d app/src/main/jni/
          echo "Inner zip ready: $(ls -lh app/src/main/jni/bootstrap-aarch64.zip)"

      - name: Grant Gradle wrapper permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: |
          ./gradlew :app:assembleDebug \
            --build-cache \
            --parallel \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -Xms512m -XX:+UseParallelGC" \
            -Dkotlin.daemon.jvm.options="-Xmx2g" \
            -Pandroid.enableR8.fullMode=false

      - name: Rename APK with short hash
        run: |
          SHORT=$(echo "${{ github.sha }}" | cut -c1-8)
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          mv "$APK" "app/build/outputs/apk/debug/iris-debug-${SHORT}.apk"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: iris-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/iris-debug-*.apk
          retention-days: 7
