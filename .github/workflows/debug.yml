name: Debug

on:
  workflow_dispatch:

concurrency:
  group: ci-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Iris Build Setup
        uses: ./.github/actions/iris-build-setup
        with:
          cache-key-suffix: debug

      - name: Inject API keys
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"      >> local.properties
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}"          >> local.properties
          echo "WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }}"    >> local.properties
          echo "TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}"      >> local.properties
          echo "NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}"          >> local.properties
          echo "GROQ_LLM_API_KEY=${{ secrets.GROQ_LLM_API_KEY }}" >> local.properties
          echo "HF_API_KEY=${{ secrets.HF_API_KEY }}"              >> local.properties

      - name: Build debug APK
        run: |
          ./gradlew :app:assembleDebug \
            --build-cache \
            --parallel \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -Xms512m -XX:+UseParallelGC" \
            -Dkotlin.daemon.jvm.options="-Xmx2g" \
            -Pandroid.enableR8.fullMode=false

      - name: Rename APK with short hash
        run: |
          SHORT=$(echo "${{ github.sha }}" | cut -c1-8)
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          mv "$APK" "app/build/outputs/apk/debug/iris-debug-${SHORT}.apk"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: iris-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/iris-debug-*.apk
          retention-days: 7
