name: Build Custom Bootstrap

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Target architecture'
        required: true
        default: 'aarch64'
        type: choice
        options:
          - aarch64
          - arm
          - x86_64
          - i686

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout IRIS
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h /

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential cmake file pkg-config \
            autoconf automake libtool m4 \
            zip unzip gzip bzip2 xz-utils \
            wget curl ca-certificates \
            openjdk-17-jdk-headless \
            python3 python3-pip \
            ccache ninja-build \
            gettext autopoint po4a lzip xmlto asciidoc docbook-xsl \
            imagemagick txt2man \
            libxml2-utils xsltproc \
            libssl-dev libelf-dev \
            patchelf \
            aapt \
            zlib1g-dev

      - name: Clone termux-packages
        run: |
          git clone --depth=1 -b master \
            https://github.com/termux/termux-packages.git \
            "${{ github.workspace }}/termux-packages"

      - name: Set up Android NDK
        run: |
          NDK_VER=$(grep -oP 'TERMUX_NDK_VERSION_NUM:="\K[^"]+' "${{ github.workspace }}/termux-packages/scripts/properties.sh")
          NDK_REV=$(grep -oP 'TERMUX_NDK_REVISION:="\K[^"]*' "${{ github.workspace }}/termux-packages/scripts/properties.sh")
          NDK_FULL="r${NDK_VER}${NDK_REV}"
          echo "NDK version: $NDK_FULL"
          if [ ! -d "$HOME/lib/android-ndk-$NDK_FULL" ]; then
            echo "Downloading NDK $NDK_FULL..."
            mkdir -p "$HOME/lib"
            curl -sL "https://dl.google.com/android/repository/android-ndk-${NDK_FULL}-linux.zip" \
              -o /tmp/ndk.zip
            unzip -q /tmp/ndk.zip -d "$HOME/lib/"
            # The zip may extract as android-ndk-r29 or android-ndk-r29-linux
            EXTRACTED=$(ls -d "$HOME/lib"/android-ndk-* 2>/dev/null | head -1)
            if [ -n "$EXTRACTED" ] && [ "$EXTRACTED" != "$HOME/lib/android-ndk-$NDK_FULL" ]; then
              mv "$EXTRACTED" "$HOME/lib/android-ndk-$NDK_FULL"
            fi
            rm -f /tmp/ndk.zip
          fi
          echo "ANDROID_NDK_HOME=$HOME/lib/android-ndk-$NDK_FULL" >> "$GITHUB_ENV"
          echo "NDK installed at $HOME/lib/android-ndk-$NDK_FULL"

      - name: Patch package name
        run: |
          cd "${{ github.workspace }}/termux-packages"
          sed -i 's/^TERMUX_APP_PACKAGE=.*/TERMUX_APP_PACKAGE="com.iris.assistant"/' scripts/properties.sh
          echo "TERMUX_APP_PACKAGE=$(grep ^TERMUX_APP_PACKAGE scripts/properties.sh)"

      - name: Apply IRIS patches
        run: |
          cd "${{ github.workspace }}/termux-packages"
          if [ -d "${{ github.workspace }}/bootstrap/patches" ]; then
            for patchfile in "${{ github.workspace }}/bootstrap/patches"/*.patch; do
              if [ -f "$patchfile" ]; then
                echo "  Applying $(basename $patchfile)..."
                patch -p1 < "$patchfile" || echo "  (patch returned $?)"
              fi
            done
          fi

      - name: Build bootstrap packages
        run: |
          bash "${{ github.workspace }}/bootstrap/build.sh"
        env:
          TERMUX_APP_PACKAGE: com.iris.assistant
          ARCH: ${{ github.event.inputs.arch || 'aarch64' }}
          IRIS_ROOT: ${{ github.workspace }}
        timeout-minutes: 180

      - name: Upload bootstrap zip
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-${{ github.event.inputs.arch || 'aarch64' }}
          path: ./output/bootstrap-*.zip
          if-no-files-found: error

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: bootstrap-$(date +'%Y%m%d')-r1
          name: "IRIS Bootstrap (${{ github.event.inputs.arch || 'aarch64' }})"
          files: ./output/bootstrap-*.zip
          body: |
            Custom Termux bootstrap for IRIS.
            Package: com.iris.assistant
            Prefix: /data/data/com.iris.assistant/files/usr
