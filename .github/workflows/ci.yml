name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Inject API keys from secrets
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"   >> local.properties
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}"       >> local.properties
          echo "WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }}"     >> local.properties
          echo "BRAVE_SEARCH_API_KEY=${{ secrets.BRAVE_SEARCH_API_KEY }}" >> local.properties
          echo "NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}"                >> local.properties

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: iris-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7